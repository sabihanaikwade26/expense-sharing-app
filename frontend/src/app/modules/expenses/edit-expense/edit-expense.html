<div class="expense-form">

  <h2>Edit Expense</h2>

  <p class="page-subtitle">
    Update and manage trip expenses efficiently.
  </p>

  <form>

    <div class="form-group">
      <label>Title</label>
      <input type="text" value="Hotel Booking">
    </div>

    <div class="form-group">
      <label>Category</label>

      <select>
        <option>Hotel</option>
        <option>Food</option>
        <option>Fuel</option>
        <option>Tickets</option>
        <option>Shopping</option>
      </select>
    </div>

    <div class="form-group">
      <label>Paid By</label>

      <select>
        <option>Member 1</option>
        <option>Member 2</option>
      </select>
    </div>

    <div class="form-group">
      <label>Amount</label>
      <input type="number" value="5000">
    </div>

    <div class="form-group">
      <label>Expense Date</label>
      <input type="date">
    </div>

    <div class="form-group">
      <label>Split Type</label>

      <select>
        <option>Equal</option>
        <option>Custom</option>
      </select>
    </div>

    <div class="form-group">
      <label>Bill Attachment</label>
      <input type="file">
    </div>

    <div class="form-group">
      <label>Notes</label>

      <textarea rows="4">
Hotel booking for Goa trip
      </textarea>

    </div>

    <button type="submit">
      Update Expense
    </button>

  </form>

</div>
