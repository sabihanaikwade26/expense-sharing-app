<div class="register-container">
  <div class="branding">
    <h1>Create Your Account</h1>

    <p>
      Start managing trips, expenses and settlements with a simple and collaborative experience.
    </p>
  </div>

  <mat-card class="register-card">
    <h2>Register</h2>

    <p class="subtitle">Create your account to start managing trip expenses.</p>

    <mat-form-field appearance="outline">
      <mat-label>Full Name</mat-label>
      <input matInput [(ngModel)]="name" placeholder="Enter your full name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" placeholder="Enter your email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>

      <input
        matInput
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        placeholder="Enter password"
      />

      <span matSuffix class="toggle" (click)="showPassword = !showPassword"> 👁 </span>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Confirm Password</mat-label>

      <input
        matInput
        [type]="showConfirmPassword ? 'text' : 'password'"
        [(ngModel)]="confirmPassword"
        placeholder="Confirm password"
      />

      <span matSuffix class="toggle" (click)="showConfirmPassword = !showConfirmPassword">
        👁
      </span>
    </mat-form-field>

    <p *ngIf="confirmPassword">
      <span *ngIf="password === confirmPassword" style="color: green"> ✔ Passwords match </span>

      <span *ngIf="password !== confirmPassword" style="color: red">
        ✖ Passwords do not match
      </span>
    </p>

    <button
      type="button"
      mat-raised-button
      color="primary"
      class="register-btn"
      (click)="onRegister()"
    >
      Create Account
    </button>

    <div class="back-link">
      Already have an account?
      <a routerLink="/">Login</a>
    </div>
  </mat-card>
</div>
