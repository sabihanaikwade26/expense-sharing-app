<div class="forgot-container">
  <div class="branding">
    <h1>Forgot Password</h1>

    <p>Enter your registered email address. Password reset functionality will be connected soon.</p>
  </div>

  <mat-card class="forgot-card">
    <h2>Forgot Password</h2>

    <mat-form-field appearance="outline">
      <mat-label>Email Address</mat-label>
      <input matInput [(ngModel)]="email" placeholder="Enter your email" />
    </mat-form-field>

    <button mat-raised-button color="primary" class="reset-btn" (click)="onSubmit()">
      Send Reset Link
    </button>

    <!-- Show token (simple version) -->
    <div *ngIf="token" class="status-badge">Token: {{ token }}</div>

    <div class="login-link">
      Remember your password?
      <a routerLink="/">Login</a>
    </div>
  </mat-card>
</div>
